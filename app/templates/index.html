<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework Helper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden;
        }
        body { 
            background-color: #f4f6f9; 
        }
        .main-container { 
            height: 100vh; 
            padding: 20px; 
            overflow: hidden;
        }
        .row.h-100 {
            height: calc(100vh - 40px);
            margin: 0;
        }
        .card { 
            height: 100%; 
            border: none; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-card {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        .card-header {
            flex-shrink: 0;
        }
        .chat-history { 
            flex: 1;
            overflow-y: auto; 
            overflow-x: hidden;
            padding: 20px; 
            background-color: #fff;
            min-height: 0;
            height: 0;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .chat-history::-webkit-scrollbar {
            width: 8px;
        }
        .chat-history::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .chat-history::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        .chat-history::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        .message { 
            margin-bottom: 15px; 
            max-width: 80%; 
            padding: 10px 15px; 
            border-radius: 15px; 
            word-wrap: break-word;
            word-break: break-word;
            white-space: pre-wrap;
            overflow-wrap: break-word;
            overflow: visible;
        }
        .message.user { 
            background-color: #007bff; 
            color: white; 
            margin-left: auto;
            text-align: left;
        }
        .message.bot { 
            background-color: #e9ecef; 
            color: black; 
            white-space: normal;
        }
        .message.bot p {
            margin: 0 0 0.6rem 0;
        }
        .message.bot p:last-child {
            margin-bottom: 0;
        }
        .message.bot pre {
            background: #1f2937;
            color: #f8fafc;
            padding: 0.75rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.5rem 0;
        }
        .message.bot code {
            font-family: SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        .message.bot :not(pre) > code {
            background: #dbe3ec;
            padding: 0.1rem 0.35rem;
            border-radius: 4px;
        }
        .loading { 
            font-style: italic; 
            color: #888; 
            font-size: 0.9em; 
        }
        .input-area {
            flex-shrink: 0;
        }
        .section-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .homework-list {
            max-height: 220px;
            overflow-y: auto;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 8px;
            background: #fff;
        }
        .homework-item {
            padding: 8px;
            border-bottom: 1px solid #f1f3f5;
            font-size: 0.9rem;
        }
        .homework-item:last-child {
            border-bottom: none;
        }
        .mini-text {
            color: #6c757d;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container-fluid main-container">
    <div class="row h-100">
        
        <div class="col-md-4 h-100">
            <div class="card p-4 h-100">
                <h4 class="mb-3">課程專區</h4>

                <div class="mb-3">
                    <label for="courseSelect" class="form-label">選擇課程</label>
                    <select class="form-select" id="courseSelect" onchange="handleCourseChange()">
                        <option value="">載入課程中...</option>
                    </select>
                    <div class="mini-text mt-1">資料來源：Notion 課程 Database</div>
                </div>

                <div class="mb-3">
                    <div class="section-title">歷史作業</div>
                    <div id="homeworkList" class="homework-list">
                        <div class="mini-text">請先選擇課程</div>
                    </div>
                    <input type="file" id="existingHwPdfInput" class="d-none" accept="application/pdf" onchange="handleExistingHomeworkFileSelected(event)">
                </div>

                <div class="mb-3">
                    <div class="section-title">新增作業到行事曆</div>
                    <input type="text" id="hwNameInput" class="form-control mb-2" placeholder="作業名稱（Name）">
                    <input type="date" id="hwDateInput" class="form-control mb-2">
                    <input type="file" id="hwPdfInput" class="form-control mb-2" accept="application/pdf">
                    <select id="hwStatusInput" class="form-select mb-2">
                        <option value="Not started" selected>Not started</option>
                        <option value="In progress">In progress</option>
                        <option value="almost_done">almost_done</option>
                        <option value="Done">Done</option>
                    </select>
                    <button id="createHomeworkBtn" class="btn btn-primary w-100" onclick="createHomework()">新增作業</button>
                    <div id="homeworkCreateStatus" class="mini-text mt-2"></div>
                </div>
            </div>
        </div>

        <div class="col-md-8 h-100">
            <div class="card chat-card h-100">
                <div class="card-header bg-white flex-shrink-0">
                    <h5 class="m-0">Homework Helper</h5>
                </div>
                
                <div id="chatHistory" class="chat-history">
                    <div class="message bot">你好！請先上傳作業相關檔案，然後問我問題。</div>
                </div>

                <div class="p-3 bg-light input-area">
                    <div class="input-group">
                        <input type="text" id="userMessage" class="form-control" placeholder="輸入你的問題..." onkeypress="handleEnter(event)">
                        <button class="btn btn-primary" onclick="sendMessage()">發送</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    marked.setOptions({
        breaks: true,
        gfm: true
    });

    function renderMarkdown(text) {
        const raw = marked.parse(text || '');
        return DOMPurify.sanitize(raw);
    }


    // 0. 初始化 session_id
    let sessionId = localStorage.getItem('chat_session_id');
    let selectedCourseId = "";
    let selectedHomeworkIdForUpload = "";
    if (!sessionId) {
        // 如果沒有，生成一個隨機 ID
        sessionId = 'sess_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('chat_session_id', sessionId);
    }
    console.log("Current Session ID:", sessionId);

    async function loadCourses() {
        const select = document.getElementById('courseSelect');
        select.innerHTML = '<option value="">載入中...</option>';

        try {
            const response = await fetch('/api/notion/courses');
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || '課程載入失敗');

            const courses = data.courses || [];
            if (!courses.length) {
                select.innerHTML = '<option value="">目前沒有課程資料</option>';
                return;
            }

            select.innerHTML = '<option value="">請選擇課程</option>';
            courses.forEach((course) => {
                const option = document.createElement('option');
                option.value = course.id;
                option.textContent = course.name;
                select.appendChild(option);
            });
        } catch (error) {
            select.innerHTML = '<option value="">無法載入課程</option>';
            renderHomeworkList([], `錯誤：${error.message}`);
        }
    }

    async function handleCourseChange() {
        const select = document.getElementById('courseSelect');
        selectedCourseId = select.value;
        if (!selectedCourseId) {
            renderHomeworkList([], '請先選擇課程');
            return;
        }
        await loadHomeworks(selectedCourseId);
    }

    async function loadHomeworks(courseId) {
        renderHomeworkList([], '讀取作業中...');
        try {
            const response = await fetch(`/api/notion/homeworks?course_id=${encodeURIComponent(courseId)}`);
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || '作業載入失敗');
            renderHomeworkList(data.homeworks || []);
        } catch (error) {
            renderHomeworkList([], `錯誤：${error.message}`);
        }
    }

    function renderHomeworkList(homeworks = [], hint = '') {
        const list = document.getElementById('homeworkList');
        if (hint) {
            list.innerHTML = `<div class="mini-text">${hint}</div>`;
            return;
        }
        if (!homeworks.length) {
            list.innerHTML = '<div class="mini-text">目前此課程尚無作業記錄</div>';
            return;
        }

        const escapeHtml = (value) => {
            return String(value || '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        };

        list.innerHTML = homeworks.map((hw) => {
            const tags = escapeHtml((hw.tags || []).join(', '));
            const date = escapeHtml(hw.date || '未設定日期');
            const status = escapeHtml(hw.status || '未設定狀態');
            const name = escapeHtml(hw.name || '(未命名作業)');
            const files = Array.isArray(hw.files) ? hw.files : [];
            const firstFile = files.length ? files[0] : null;
            const fileUrl = firstFile
                ? (firstFile.external?.url || firstFile.file?.url || '')
                : '';
            return `
                <div class="homework-item">
                    <div><strong>${name}</strong></div>
                    <div class="mini-text">日期：${date}</div>
                    <div class="mini-text">狀態：${status}</div>
                    <div class="mini-text">標籤：${tags || '—'}</div>
                    <div class="mini-text">
                        PDF：${fileUrl
                            ? `<a href="${escapeHtml(fileUrl)}" target="_blank" rel="noopener noreferrer">預覽</a>`
                            : `<button type="button" class="btn btn-sm btn-outline-primary py-0 px-2" onclick="openExistingHomeworkFilePicker('${hw.id}')">上傳</button>`}
                    </div>
                </div>
            `;
        }).join('');
    }

    function openExistingHomeworkFilePicker(homeworkId) {
        selectedHomeworkIdForUpload = homeworkId;
        const input = document.getElementById('existingHwPdfInput');
        input.value = '';
        input.click();
    }

    async function handleExistingHomeworkFileSelected(event) {
        const file = event.target.files?.[0];
        if (!file || !selectedHomeworkIdForUpload) return;

        const statusEl = document.getElementById('homeworkCreateStatus');
        statusEl.textContent = '補傳附件中...';

        try {
            const formData = new FormData();
            formData.append('file', file);

            const response = await fetch(`/api/notion/homeworks/${encodeURIComponent(selectedHomeworkIdForUpload)}/file`, {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || '附件上傳失敗');

            const chunks = data?.data?.chroma_chunks ?? 0;
            statusEl.textContent = `附件上傳成功，已同步 Chroma（${chunks} chunks）`;
            await loadHomeworks(selectedCourseId);
        } catch (error) {
            statusEl.textContent = `錯誤：${error.message}`;
        } finally {
            selectedHomeworkIdForUpload = "";
            event.target.value = '';
        }
    }

    async function createHomework() {
        const statusEl = document.getElementById('homeworkCreateStatus');
        const btn = document.getElementById('createHomeworkBtn');
        const name = document.getElementById('hwNameInput').value.trim();
        const dueDate = document.getElementById('hwDateInput').value;
        const pdfFile = document.getElementById('hwPdfInput').files[0];
        const status = document.getElementById('hwStatusInput').value;

        if (!selectedCourseId) {
            statusEl.textContent = '請先選擇課程';
            return;
        }
        if (!name) {
            statusEl.textContent = '請輸入作業名稱';
            return;
        }

        const tags = ['作業'];

        btn.disabled = true;
        statusEl.textContent = '建立中...';
        try {
            const formData = new FormData();
            formData.append('course_id', selectedCourseId);
            formData.append('name', name);
            formData.append('due_date', dueDate || '');
            formData.append('tags', JSON.stringify(tags));
            formData.append('status', status || '');
            if (pdfFile) {
                formData.append('file', pdfFile);
            }

            const response = await fetch('/api/notion/homeworks', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || '建立失敗');

            statusEl.textContent = '新增成功，已寫入行事曆資料庫';
            document.getElementById('hwNameInput').value = '';
            document.getElementById('hwDateInput').value = '';
            document.getElementById('hwPdfInput').value = '';
            document.getElementById('hwStatusInput').value = 'Not started';
            await loadHomeworks(selectedCourseId);
        } catch (error) {
            statusEl.textContent = `錯誤：${error.message}`;
        } finally {
            btn.disabled = false;
        }
    }

    // 2. 處理發送訊息
    async function sendMessage() {
        const input = document.getElementById('userMessage');
        const history = document.getElementById('chatHistory');
        const message = input.value.trim();

        if (!message) return;

        // 顯示使用者訊息
        appendMessage('user', message);
        input.value = '';

        // 顯示 Loading
        const loadingId = appendMessage('bot', '思考中...', true);

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, session_id: sessionId })
            });
            const data = await response.json();

            // 移除 Loading，顯示回答
            removeMessage(loadingId);
            
            // 檢查是否有錯誤
            if (data.error) {
                appendMessage('bot', "發生錯誤：" + data.error);
            } else if (data.answer) {
                appendMessage('bot', data.answer);
            } else {
                appendMessage('bot', "未收到有效回應");
            }

        } catch (error) {
            removeMessage(loadingId);
            appendMessage('bot', "發生錯誤：" + error.message);
        }
    }

    // 輔助函式：新增訊息到畫面
    function appendMessage(sender, text, isLoading = false) {
        const history = document.getElementById('chatHistory');
        const div = document.createElement('div');
        div.className = `message ${sender} ${isLoading ? 'loading' : ''}`;
        if (sender === 'bot' && !isLoading) {
            div.innerHTML = renderMarkdown(text);
        } else {
            div.innerText = text;
        }
        div.id = isLoading ? 'loading-msg' : '';
        history.appendChild(div);
        // 自動滾動到底部（當有新訊息時）
        scrollToBottom();
        return div.id;
    }

    // 滾動到底部函式
    function scrollToBottom() {
        const history = document.getElementById('chatHistory');
        // 使用 requestAnimationFrame 確保 DOM 更新後再滾動
        requestAnimationFrame(() => {
            history.scrollTo({
                top: history.scrollHeight,
                behavior: 'smooth'
            });
        });
    }

    // 頁面載入時確保滾動到底部
    window.addEventListener('load', function() {
        scrollToBottom();
        loadCourses();
    });

    function removeMessage(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }

    function handleEnter(e) {
        if (e.key === 'Enter') sendMessage();
    }
</script>

</body>
</html>
